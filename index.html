<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baustellenbericht Ersteller</title>
    <!-- Tailwind CSS (Für das Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2pdf.js (Für die PDF-Generierung) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @media print {
            body * { visibility: hidden; }
            #report-preview, #report-preview * { visibility: visible; }
            #report-preview { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
            .page-break { page-break-after: always; break-after: page; }
            .avoid-break { page-break-inside: avoid; break-inside: avoid; }
        }
        
        /* Render-Klasse für html2pdf */
        .pdf-render-mode {
            padding: 20px !important;
            background: white !important;
        }
        /* Seitenumbruch: page-break-before vermeidet Leerseiten besser als page-break-after */
        .pdf-render-mode .page-break-entry {
            page-break-before: always;
            break-before: page;
        }

        /* Tab-Übergangsanimation */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased pb-24">

    <nav class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center no-print">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i data-lucide="clipboard-check"></i> Baustellenbericht
        </h1>
        <button onclick="clearAllData()" class="text-xs bg-red-500 px-3 py-1 rounded hover:bg-red-600">Zurücksetzen</button>
    </nav>

    <div class="max-w-4xl mx-auto p-4 no-print">
        
        <!-- Tab-Buttons -->
        <div class="flex border-b border-gray-300 mb-4">
            <button onclick="switchTab('tab-form')" id="btn-tab-form" class="flex-1 py-2 font-semibold text-blue-600 border-b-2 border-blue-600">📝 Neuer Eintrag</button>
            <button onclick="switchTab('tab-preview')" id="btn-tab-preview" class="flex-1 py-2 font-semibold text-gray-500 hover:text-blue-600">📄 Vorschau & Senden</button>
            <button onclick="switchTab('tab-settings')" id="btn-tab-settings" class="flex-1 py-2 font-semibold text-gray-500 hover:text-blue-600">⚙️ Einstellungen</button>
        </div>

        <div id="tab-form" class="tab-content active bg-white p-4 rounded-lg shadow">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Adresse (Baustelle):</label>
                    <input type="text" id="entry-adresse" class="w-full border rounded p-2 focus:ring focus:ring-blue-200" placeholder="Bsp: Musterstraße 12, 64331 Weiterstadt">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">NVT:</label>
                    <input type="text" id="entry-nvt" class="w-full border rounded p-2 focus:ring focus:ring-blue-200" placeholder="Bsp: NVT-247">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Beschreibung (Befund etc.):</label>
                    <textarea id="entry-text" rows="3" class="w-full border rounded p-2 focus:ring focus:ring-blue-200" placeholder="Bsp: Mehrstärke Asphalt..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Foto aufnehmen / hinzufügen:</label>
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Kamera Butonu -->
                        <label for="entry-image-camera" class="flex flex-col items-center justify-center h-28 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100">
                            <i data-lucide="camera" class="w-7 h-7 text-blue-500 mb-1"></i>
                            <span class="text-sm font-semibold text-blue-600">Kamera</span>
                            <input id="entry-image-camera" type="file" accept="image/*" capture="environment" class="hidden" onchange="previewSelectedImage(event)" />
                        </label>
                        <!-- Galeri Butonu -->
                        <label for="entry-image-gallery" class="flex flex-col items-center justify-center h-28 border-2 border-green-300 border-dashed rounded-lg cursor-pointer bg-green-50 hover:bg-green-100">
                            <i data-lucide="image" class="w-7 h-7 text-green-500 mb-1"></i>
                            <span class="text-sm font-semibold text-green-600">Galerie</span>
                            <input id="entry-image-gallery" type="file" accept="image/*" class="hidden" onchange="previewSelectedImage(event)" />
                        </label>
                    </div>
                    <img id="image-preview" class="mt-2 hidden max-h-48 rounded object-cover mx-auto" />
                </div>

                <button onclick="addEntry()" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold text-lg flex justify-center items-center gap-2 hover:bg-green-600 transition">
                    <i data-lucide="plus-circle"></i> Seite / Eintrag hinzufügen
                </button>
            </div>
        </div>

        <div id="tab-preview" class="tab-content bg-white p-4 rounded-lg shadow">
            <div class="flex flex-col sm:flex-row gap-2 mb-6 justify-between">
                <button onclick="generatePDF()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded font-semibold flex items-center justify-center gap-2 hover:bg-blue-700">
                    <i data-lucide="file-down"></i> PDF herunterladen
                </button>
                <button onclick="shareViaEmail()" class="flex-1 bg-indigo-600 text-white px-4 py-2 rounded font-semibold flex items-center justify-center gap-2 hover:bg-indigo-700">
                    <i data-lucide="mail"></i> E-Mail senden
                </button>
                <button onclick="nativeShare()" class="flex-1 bg-green-600 text-white px-4 py-2 rounded font-semibold flex items-center justify-center gap-2 hover:bg-green-700 hidden" id="native-share-btn">
                    <i data-lucide="share-2"></i> WhatsApp / Teilen
                </button>
            </div>
            
            <p class="text-sm text-gray-500 mb-4 border-b pb-2"><span id="entry-count" class="font-bold">0</span> Seite(n) hinzugefügt.</p>
            
            <!-- Container für die PDF-Generierung -->
            <div id="report-preview" class="w-full bg-white text-black text-sm sm:text-base">
                <!-- Inhalt wird hier per JS geladen -->
            </div>
        </div>

        <div id="tab-settings" class="tab-content bg-white p-4 rounded-lg shadow">
            <p class="text-sm text-gray-500 mb-4">Diese Einstellungen werden auf Ihrem Telefon automatisch gespeichert.</p>
            <div class="space-y-4">

                <!-- Firma Bilgileri -->
                <div class="border-b pb-4">
                    <h3 class="font-bold text-gray-700 mb-3">Firma</h3>
                    <div class="mb-3">
                        <label class="block text-sm font-medium mb-1">Firmaname:</label>
                        <input type="text" id="set-firma-name" class="w-full border rounded p-2" placeholder="Bsp: Musterbau GmbH"
                            oninput="reportData.settings.firmaName = this.value; renderPreview();">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Firmalogo: <span class="text-xs text-gray-500 font-normal">(Wird automatisch auf 300px verkleinert)</span></label>
                        <div class="flex items-center gap-3">
                            <label for="set-logo" class="cursor-pointer bg-gray-100 hover:bg-gray-200 border border-gray-300 rounded px-3 py-2 text-sm">
                                Logo auswählen
                                <input type="file" id="set-logo" accept="image/*" class="hidden" onchange="loadLogo(event)">
                            </label>
                            <img id="logo-preview" class="hidden max-h-12 max-w-32 object-contain border rounded" />
                            <button onclick="removeLogo()" id="remove-logo-btn" class="hidden text-xs text-red-500 hover:text-red-700">Entfernen</button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Projektname:</label>
                    <input type="text" id="set-project" class="w-full border rounded p-2" placeholder="Bsp: Projekt Weiterstadt West"
                        oninput="reportData.settings.project = this.value; renderPreview();">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Berichts-Kopfzeile: <span class="text-xs text-gray-500 font-normal">(Erscheint oben im PDF)</span></label>
                    <input type="text" id="set-header-title" class="w-full border rounded p-2" placeholder="Bsp: Mehrkosten / Baustellenbericht"
                        oninput="reportData.settings.headerTitle = this.value; renderPreview();">
                    <p class="text-xs text-gray-500 mt-1">Nutzen Sie <b>{projekt}</b>, um den Projektnamen einzufügen. Bsp: <i>Mehrkosten - {projekt}</i></p>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Zuständige Person (Weitergegeben an):</label>
                    <input type="text" id="set-person" class="w-full border rounded p-2" placeholder="Bsp: Nick Hißen">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Ziel-E-Mail-Adresse(n): <span class="text-xs text-gray-500 font-normal">(Mit Komma getrennt)</span></label>
                    <input type="text" id="set-email" class="w-full border rounded p-2" placeholder="Bsp: info@firma.com, chef@firma.com">
                </div>
                
                <div class="border-t pt-4 mt-4">
                    <h3 class="font-bold text-gray-700 mb-2">E-Mail Vorlage</h3>
                    <div class="mb-3">
                        <label class="block text-sm font-medium mb-1">Betreff:</label>
                        <input type="text" id="set-mail-subject" class="w-full border rounded p-2" placeholder="Bsp: Baustellenbericht - [Projektname]">
                        <p class="text-xs text-gray-500 mt-1">Nutzen Sie <b>{projekt}</b>, um den Projektnamen automatisch einzufügen.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Nachricht:</label>
                        <textarea id="set-mail-body" rows="4" class="w-full border rounded p-2" placeholder="Bsp: Hallo, anbei der aktuelle Bericht..."></textarea>
                    </div>
                </div>

                <button onclick="saveSettings()" class="w-full bg-gray-800 text-white py-2 rounded font-bold hover:bg-gray-900">
                    Einstellungen speichern
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- STATUS- UND DATENVERWALTUNG ---
        let reportData = {
            entries: [],
            settings: {
                project: '',
                person: '',
                email: '',
                firmaName: '',
                firmaLogo: '',
                headerTitle: 'Mehrkosten - {projekt}',
                mailSubject: 'Baustellenbericht: {projekt}',
                mailBody: 'Hallo,\n\nanbei finden Sie den aktuellen Baustellenbericht als PDF im Anhang.\n\nViele Grüße'
            }
        };

        // --- XSS KORUMAL HTML ESCAPE FONKSIYONU ---
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        let tempCompressedImage = null;

        // Daten beim Laden der Seite abrufen
        window.onload = () => {
            // Icons laden (nach dem DOM-Aufbau, um Race Condition zu vermeiden)
            lucide.createIcons();

            loadFromStorage();
            
            // Teilen-Button anzeigen, wenn iOS und Share-API verfügbar sind
            if (navigator.share) {
                document.getElementById('native-share-btn').classList.remove('hidden');
            }

            // --- F12 / DevTools Engelleme ---
            // Sağ tık menüsünü devre dışı bırak
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            // Klavye kısayollarını engelle (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
            document.addEventListener('keydown', function(e) {
                // F12
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I (DevTools)
                if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+J (Console)
                if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+C (Element seç)
                if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+U (Kaynak görüntüle)
                if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                    e.preventDefault();
                    return false;
                }
            });
        };

        function loadFromStorage() {
            const saved = localStorage.getItem('siteReportData');
            if (saved) {
                reportData = JSON.parse(saved);
                document.getElementById('set-project').value      = reportData.settings.project || '';
                document.getElementById('set-person').value       = reportData.settings.person || '';
                document.getElementById('set-email').value        = reportData.settings.email || '';
                document.getElementById('set-header-title').value = reportData.settings.headerTitle || 'Mehrkosten - {projekt}';
                document.getElementById('set-firma-name').value   = reportData.settings.firmaName || '';
                document.getElementById('set-mail-subject').value = reportData.settings.mailSubject || 'Baustellenbericht: {projekt}';
                document.getElementById('set-mail-body').value    = reportData.settings.mailBody || 'Hallo,\n\nanbei finden Sie den aktuellen Baustellenbericht als PDF im Anhang.\n\nViele Grüße';

                // Logo varsa göster
                if (reportData.settings.firmaLogo) {
                    const prev = document.getElementById('logo-preview');
                    prev.src = reportData.settings.firmaLogo;
                    prev.classList.remove('hidden');
                    document.getElementById('remove-logo-btn').classList.remove('hidden');
                }

                renderPreview();
            }
        }

        function saveToStorage() {
            localStorage.setItem('siteReportData', JSON.stringify(reportData));
            renderPreview();
        }

        // --- TAB-VERWALTUNG ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('[id^="btn-tab-"]').forEach(btn => {
                btn.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                btn.classList.add('text-gray-500');
            });
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.remove('text-gray-500');
            document.getElementById('btn-' + tabId).classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
        }

        // --- EINSTELLUNGEN ---
        function saveSettings() {
            reportData.settings.project     = document.getElementById('set-project').value;
            reportData.settings.person      = document.getElementById('set-person').value;
            reportData.settings.email       = document.getElementById('set-email').value;
            reportData.settings.headerTitle = document.getElementById('set-header-title').value;
            reportData.settings.firmaName   = document.getElementById('set-firma-name').value;
            reportData.settings.mailSubject = document.getElementById('set-mail-subject').value;
            reportData.settings.mailBody    = document.getElementById('set-mail-body').value;
            // firmaLogo zaten loadLogo() ile kaydedilir

            saveToStorage();
            alert("Einstellungen gespeichert!");
            switchTab('tab-form');
        }

        // --- LOGO YÜKLEME (Canvas ile sıkıştırma) ---
        async function loadLogo(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                const MAX_W = 300, MAX_H = 120;
                let bmp = await createImageBitmap(file);
                let w = bmp.width, h = bmp.height;
                const ratio = Math.min(MAX_W / w, MAX_H / h, 1);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);

                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
                bmp.close();

                const logoData = canvas.toDataURL('image/png');
                reportData.settings.firmaLogo = logoData;
                saveToStorage();

                const prev = document.getElementById('logo-preview');
                prev.src = logoData;
                prev.classList.remove('hidden');
                document.getElementById('remove-logo-btn').classList.remove('hidden');
            } catch(e) {
                alert('Fehler beim Laden des Logos.');
            }
        }

        function removeLogo() {
            reportData.settings.firmaLogo = '';
            saveToStorage();
            document.getElementById('logo-preview').classList.add('hidden');
            document.getElementById('remove-logo-btn').classList.add('hidden');
            // Logo input sıfırla
            const old = document.getElementById('set-logo');
            const neu = old.cloneNode(true);
            old.parentNode.replaceChild(neu, old);
        }

        function clearAllData() {
            if(confirm("Alle gespeicherten Berichte und Seiten werden gelöscht. Sind Sie sicher?")) {
                reportData.entries = [];
                saveToStorage();
                document.getElementById('entry-text').value = '';
                document.getElementById('entry-image').value = '';
                document.getElementById('image-preview').classList.add('hidden');
                tempCompressedImage = null;
                alert("Zurückgesetzt.");
            }
        }

        // --- BILDVERARBEITUNG UND ZEITSTEMPEL ---
        // createImageBitmap ile EXIF rotasyonu otomatik düzeltilir (Chrome 83+, iOS Safari 15+)
        // Manuel EXIF parse gerekmez — modern mobil taıyıcılar zaten düzeltir.
        async function previewSelectedImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                let source, drawWidth, drawHeight;

                if (typeof createImageBitmap !== 'undefined') {
                    try {
                        // imageOrientation:'from-image' → EXIF yönünü otomatik uygular
                        source = await createImageBitmap(file, { imageOrientation: 'from-image' });
                    } catch (e) {
                        // Eski taıyıcı fallback (imageOrientation desteklenmiyorsa)
                        source = await createImageBitmap(file);
                    }
                    drawWidth  = source.width;
                    drawHeight = source.height;
                } else {
                    // createImageBitmap desteklemeyen çok eski taıyıcılar için FileReader fallback
                    source = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = e => {
                            const img = new Image();
                            img.onload = () => resolve(img);
                            img.onerror = reject;
                            img.src = e.target.result;
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                    drawWidth  = source.width;
                    drawHeight = source.height;
                }

                // En-boy oranı korunarak hem genişlik hem yükseklik sınırla
                const MAX_WIDTH  = 1200;
                const MAX_HEIGHT = 900;
                const scaleRatio = Math.min(
                    drawWidth  > MAX_WIDTH  ? MAX_WIDTH  / drawWidth  : 1,
                    drawHeight > MAX_HEIGHT ? MAX_HEIGHT / drawHeight : 1
                );
                if (scaleRatio < 1) {
                    drawWidth  = Math.round(drawWidth  * scaleRatio);
                    drawHeight = Math.round(drawHeight * scaleRatio);
                }

                const canvas = document.createElement('canvas');
                canvas.width  = drawWidth;
                canvas.height = drawHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(source, 0, 0, drawWidth, drawHeight);
                if (source.close) source.close(); // ImageBitmap bellek serbest bırak

                // Zeitstempel auf dem Foto
                const now = new Date();
                const timestamp = now.toLocaleDateString('de-DE') + ' ' + now.toLocaleTimeString('de-DE');
                ctx.font        = `bold ${Math.round(drawWidth / 40)}px Arial`;
                ctx.fillStyle   = 'white';
                ctx.shadowColor = 'black';
                ctx.shadowBlur  = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.textAlign   = 'right';
                ctx.fillText(timestamp, drawWidth - 20, drawHeight - 20);
                ctx.fillText(reportData.settings.project || '', drawWidth - 20, drawHeight - 52);

                tempCompressedImage = canvas.toDataURL('image/jpeg', 0.7);

                const preview = document.getElementById('image-preview');
                preview.src = tempCompressedImage;
                preview.classList.remove('hidden');

            } catch (err) {
                console.error('Bildfehler:', err);
                alert('Fehler beim Laden des Bildes. Bitte erneut versuchen.');
            }
        }

        function addEntry() {
            const text    = document.getElementById('entry-text').value.trim();
            const adresse = document.getElementById('entry-adresse').value.trim();
            const nvt     = document.getElementById('entry-nvt').value.trim();
            
            if (!text) {
                alert("Bitte geben Sie eine Beschreibung (Befund) ein!");
                return;
            }

            if (!tempCompressedImage) {
                alert("Bitte machen Sie zuerst ein Foto oder fügen Sie eines hinzu!");
                return;
            }

            const now = new Date();
            const dateStr = now.toLocaleDateString('de-DE') + ' ' + now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            reportData.entries.push({
                text:    text,
                adresse: adresse,
                nvt:     nvt,
                image:   tempCompressedImage,
                date:    dateStr
            });

            saveToStorage();

            // Formular leeren
            document.getElementById('entry-text').value    = '';
            document.getElementById('entry-adresse').value = '';
            document.getElementById('entry-nvt').value     = '';
            document.getElementById('image-preview').classList.add('hidden');
            tempCompressedImage = null;

            // Her iki input'u sıfırla (Clone-Trick für mobile Browser)
            ['entry-image-camera', 'entry-image-gallery'].forEach(id => {
                const old = document.getElementById(id);
                if (old) {
                    const neu = old.cloneNode(true);
                    old.parentNode.replaceChild(neu, old);
                }
            });

            alert("Seite zum Bericht hinzugefügt! Sie können es in der Vorschau sehen.");
            switchTab('tab-preview');
        }

        // --- BERICHT-VORSCHAU ---
        function renderPreview() {
            const container = document.getElementById('report-preview');
            container.innerHTML = '';
            document.getElementById('entry-count').innerText = reportData.entries.length;

            if (reportData.entries.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">Noch keine Einträge hinzugefügt.</p>';
                return;
            }

            let html = '';

            reportData.entries.forEach((entry, index) => {
                const headerTitle = (reportData.settings.headerTitle || 'Mehrkosten - {projekt}')
                    .replace('{projekt}', reportData.settings.project || '');
                const firmaNameHtml = reportData.settings.firmaName
                    ? `<p class="text-sm text-gray-600 mt-1">${escapeHtml(reportData.settings.firmaName)}</p>` : '';
                const logoHtml = reportData.settings.firmaLogo
                    ? `<img src="${reportData.settings.firmaLogo}" style="max-height:50px;max-width:150px;object-fit:contain;" />` : '';
                const adresseHtml = entry.adresse
                    ? `<div class="col-span-1"><span class="font-bold block border-b border-gray-300">Adresse:</span><p class="mt-1 text-xs break-words">${escapeHtml(entry.adresse)}</p></div>` 
                    : '<div class="col-span-1"></div>';
                const nvtHtml = entry.nvt
                    ? `<div class="col-span-1"><span class="font-bold block border-b border-gray-300">NVT:</span><p class="mt-1 text-xs">${escapeHtml(entry.nvt)}</p></div>` 
                    : '<div class="col-span-1"></div>';
                const dateHtml = `<div class="col-span-1"><span class="font-bold block border-b border-gray-300">Datum:</span><p class="mt-1 text-xs">${entry.date}</p></div>`;

                html += `
                <div class="page-container avoid-break border border-gray-200 mb-8 pb-4 ${index > 0 ? 'page-break-entry' : ''}">
                    <!-- Kopfzeile: Logo + Firma + Titel -->
                    <div class="border-b-2 border-black mb-4 pb-2 p-4 flex justify-between items-start">
                        <div>
                            <h2 class="font-bold text-lg uppercase">${headerTitle}</h2>
                            ${firmaNameHtml}
                        </div>
                        ${logoHtml}
                    </div>

                    <!-- PDF-Inhalt (Links Text - Rechts Bild) -->
                    <div class="flex flex-col sm:flex-row gap-4 p-4">
                        <!-- Linke Spalte -->
                        <div class="w-full sm:w-1/3 flex flex-col gap-4">
                            <!-- Yan yana bilgiler (Adresse, NVT, Datum) -->
                            <div class="grid grid-cols-3 gap-2">
                                ${adresseHtml}
                                ${nvtHtml}
                                ${dateHtml}
                            </div>
                            
                            <div>
                                <span class="font-bold block border-b border-gray-300">Befund / Beschreibung:</span>
                                <p class="mt-1 whitespace-pre-wrap text-xs sm:text-sm">${escapeHtml(entry.text)}</p>
                            </div>
                            
                            <div>
                                <span class="font-bold block border-b border-gray-300">Weitergegeben an:</span>
                                <p class="mt-1 text-xs sm:text-sm">${reportData.settings.person || '-'}</p>
                            </div>
                            
                            <div class="mt-auto pt-4">
                                <span class="text-xs text-gray-400">Seite: ${index + 1} / ${reportData.entries.length}</span>
                            </div>
                        </div>
                        <!-- Rechte Spalte: Bild -->
                        <div class="w-full sm:w-2/3 flex items-center justify-center bg-gray-50 rounded border p-1">
                            <img src="${entry.image}" class="max-w-full h-auto object-scale-down rounded" style="max-height:420px; display:block;" />
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        // --- PDF HERUNTERLADEN UND TEILEN ---
        function generatePDF() {
            if (reportData.entries.length === 0) {
                alert("Fügen Sie zuerst einen Eintrag hinzu, um eine PDF zu erstellen.");
                return;
            }

            const element = document.getElementById('report-preview');
            element.classList.add('pdf-render-mode'); // PDF-Stil
            
            const now = new Date();
            const timeStamp = now.toLocaleDateString('de-DE') + '_' + now.toTimeString().split(' ')[0].replace(/:/g, '-');
            const opt = {
                margin:       10,
                filename:     `Baustellenbericht_${timeStamp}.pdf`,
                image:        { type: 'jpeg', quality: 0.95 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pageBreak:    { mode: 'avoid-all' }
            };

            // HTML in PDF konvertieren und herunterladen
            html2pdf().set(opt).from(element).save().then(() => {
                 element.classList.remove('pdf-render-mode');
            });
        }

        // --- PER OUTLOOK / MAIL SENDEN (MAILTO) ---
        function shareViaEmail() {
             if (reportData.entries.length === 0) {
                alert("Fügen Sie zuerst einen Eintrag hinzu, um ihn zu senden.");
                return;
            }

            const to = reportData.settings.email;
            if (!to || to.trim() === '') {
                alert("Bitte geben Sie zuerst eine Ziel-E-Mail-Adresse in den Einstellungen ein!");
                switchTab('tab-settings');
                return;
            }
            
            // Ersetze {projekt} im Betreff durch den echten Projektnamen
            let rawSubject = reportData.settings.mailSubject || `Baustellenbericht: ${reportData.settings.project}`;
            rawSubject = rawSubject.replace('{projekt}', reportData.settings.project || '');
            
            const subject = encodeURIComponent(rawSubject);
            
            // Nachrichtentext abrufen
            let rawBody = reportData.settings.mailBody || 'Anbei der Bericht.';
            const bodyText = encodeURIComponent(rawBody);
            
            // Öffnet die Mail-App (Outlook, Mail etc.)
            window.location.href = `mailto:${to}?subject=${subject}&body=${bodyText}`;
        }

        // --- IOS / ANDROID NATIVE SHARE (WhatsApp etc.) ---
        async function nativeShare() {
            if (reportData.entries.length === 0) return;
            
            try {
                // PDF im Hintergrund als Blob (Datei) erstellen
                const element = document.getElementById('report-preview');
                element.classList.add('pdf-render-mode');
                
                const opt = { margin: 10, filename: 'bericht.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                const pdfBlob = await html2pdf().set(opt).from(element).output('blob');
                element.classList.remove('pdf-render-mode');

                const file = new File([pdfBlob], `Bericht_${Date.now()}.pdf`, { type: "application/pdf" });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: 'Baustellenbericht',
                        text: `${reportData.settings.project} - Baustellenbericht`,
                        files: [file]
                    });
                } else {
                    alert("Ihr Gerät unterstützt das direkte Teilen von PDFs nicht. Bitte verwenden Sie den Button 'PDF herunterladen'.");
                }
            } catch (error) {
                console.error("Teilen-Fehler:", error);
                alert("Beim Teilen ist ein Fehler aufgetreten.");
            }
        }
    </script>
</body>
